<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İletişim — Fnoren</title>
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Fnoren</a>
  <ul class="nav-links">
    <li><a href="urunler.html">Ürünler</a></li>
    <li><a href="hakkimizda.html">Hakkımızda</a></li>
    <li><a href="iletisim.html" style="color:var(--accent)">İletişim</a></li>
  </ul>
</nav>

<section style="padding-top:7rem">
  <div class="container" style="max-width:600px">
    <div class="section-label fade-in">İletişim</div>
    <h2 class="fade-in">Bize Ulaşın</h2>
    <div class="divider fade-in"></div>

    <form action="https://formspree.io/f/FORM_ID" method="POST" class="fade-in">
      <div class="form-group">
        <label>Ad Soyad</label>
        <input type="text" name="name" required placeholder="Adınız">
      </div>
      <div class="form-group">
        <label>E-posta</label>
        <input type="email" name="email" required placeholder="email@ornek.com">
      </div>
      <div class="form-group">
        <label>Mesaj</label>
        <textarea name="message" required placeholder="Mesajınız..."></textarea>
      </div>
      <button type="submit" class="btn btn-primary">Gönder →</button>
    </form>

    <div style="margin-top:3rem;color:var(--muted);font-size:0.88rem" class="fade-in">
      <p>📧 <a href="mailto:fnoreforms@gmail.com" style="color:var(--muted)">fnoreforms@gmail.com</a></p>
      <p style="margin-top:0.5rem">📍 Bursa, Türkiye</p>
    </div>
  </div>
</section>

<footer>
  <div class="footer-inner">
    <span>© 2026 Fnoren — Bursa, TR</span>
    <div style="display:flex;gap:1.5rem">
      <a href="urunler.html">Ürünler</a>
      <a href="hakkimizda.html">Hakkımızda</a>
      <a href="iletisim.html">İletişim</a>
    </div>
    <span>304 Paslanmaz Çelik</span>
  </div>
</footer>
<script src="assets/js/main.js"></script>
</body>
</html>
