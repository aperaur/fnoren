<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Fnoren ürün kataloğu — 304 paslanmaz çelik mutfak ve banyo aksesuarları.">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self'; connect-src https://aperaur-production.up.railway.app; img-src 'self' data: https://cdn.shopier.app;">
  <title>Ürünler — Fnoren</title>
  <link rel="stylesheet" href="assets/css/main.css">
  <style>
    .filter-bar { display:flex; gap:0.75rem; flex-wrap:wrap; margin-bottom:2rem; }
    .kat-btn { background:transparent; border:1px solid var(--border); color:var(--muted); padding:0.4rem 1rem; font-family:'Rajdhani',sans-serif; font-size:0.8rem; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; transition:all 0.2s; border-radius:var(--radius); }
    .kat-btn:hover, .kat-btn.active { border-color:var(--accent); color:var(--accent); }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Fnoren</a>
  <ul class="nav-links">
    <li><a href="urunler.html" style="color:var(--accent)">Ürünler</a></li>
    <li><a href="hakkimizda.html">Hakkımızda</a></li>
    <li><a href="iletisim.html">İletişim</a></li>
  </ul>
</nav>

<section style="padding-top:7rem">
  <div class="container">
    <div class="section-label">Koleksiyon</div>
    <h2>Tüm Ürünler</h2>
    <div class="divider"></div>

    <div class="filter-bar">
      <button class="kat-btn active" onclick="kategoriFiltre('hepsi')">Hepsi</button>
      <button class="kat-btn" onclick="kategoriFiltre('mutfak')">Mutfak</button>
      <button class="kat-btn" onclick="kategoriFiltre('banyo')">Banyo</button>
    </div>

    <div class="urun-grid" id="urun-grid"></div>
  </div>
</section>

<footer>
  <div class="footer-inner">
    <span>© 2026 Fnoren — Bursa, TR</span>
    <div style="display:flex;gap:1.5rem">
      <a href="urunler.html">Ürünler</a>
      <a href="hakkimizda.html">Hakkımızda</a>
      <a href="iletisim.html">İletişim</a>
    </div>
    <span>304 Paslanmaz Çelik</span>
  </div>
</footer>

<button id="chat-toggle" title="Destek">💬</button>
<div id="chat-panel">
  <div class="chat-header">
    <span>Fnoren Destek</span>
    <button id="chat-close" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem">✕</button>
  </div>
  <div class="chat-msgs" id="chat-msgs"></div>
  <div class="chat-input-row">
    <input id="chat-input" type="text" placeholder="Bir soru sorun..." autocomplete="off">
    <button id="chat-send">→</button>
  </div>
</div>

<script src="assets/js/main.js"></script>
<script src="assets/js/urunler.js"></script>
<script src="assets/js/widget.js"></script>
<script>document.addEventListener("DOMContentLoaded", () => urunleriYukle("urun-grid"));</script>
</body>
</html>
