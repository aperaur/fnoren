<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Fnoren ürün kataloğu — 304 paslanmaz çelik mutfak ve banyo aksesuarları.">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self'; connect-src https://aperaur-production.up.railway.app; img-src 'self' data: https://cdn.shopier.app;">
  <title>Ürünler — Fnoren</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Fnoren</a>
  <ul class="nav-links">
    <li><a href="urunler.html" class="active">Ürünler</a></li>
    <li><a href="hakkimizda.html">Hakkımızda</a></li>
    <li><a href="iletisim.html">İletişim</a></li>
  </ul>
</nav>

<section class="section" style="padding-top:calc(var(--nav-h) + 4rem)">
  <div class="container">
    <span class="label">Koleksiyon</span>
    <h2 style="margin-top:0.5rem;margin-bottom:1.5rem">Tüm Ürünler</h2>
    <hr class="divider">

    <div class="filter-bar">
      <button class="kat-btn active" onclick="kategoriFiltre(this,'hepsi')">Hepsi</button>
      <button class="kat-btn" onclick="kategoriFiltre(this,'mutfak')">Mutfak</button>
      <button class="kat-btn" onclick="kategoriFiltre(this,'banyo')">Banyo</button>
      <button class="kat-btn" onclick="kategoriFiltre(this,'giris')">Giriş</button>
    </div>

    <div class="urun-grid" id="urun-grid"></div>
  </div>
</section>

<footer>
  <div class="footer-inner">
    <span>© 2026 Fnoren</span>
    <div class="footer-links">
      <a href="urunler.html">Ürünler</a>
      <a href="hakkimizda.html">Hakkımızda</a>
      <a href="iletisim.html">İletişim</a>
    </div>
    <span>Bursa, TR — 304 Paslanmaz Çelik</span>
  </div>
</footer>

<button id="chat-toggle" title="Destek" aria-label="Destek">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
</button>
<div id="chat-panel">
  <div class="chat-header">
    <span>Fnoren Destek</span>
    <button id="chat-close" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;line-height:1">✕</button>
  </div>
  <div class="chat-msgs" id="chat-msgs"></div>
  <div class="chat-input-row">
    <input id="chat-input" type="text" placeholder="Soru sorun..." autocomplete="off">
    <button id="chat-send">→</button>
  </div>
</div>

<script src="assets/js/main.js"></script>
<script src="assets/js/urunler.js"></script>
<script src="assets/js/widget.js"></script>
<script>document.addEventListener("DOMContentLoaded", () => urunleriYukle("urun-grid"));</script>
</body>
</html>
